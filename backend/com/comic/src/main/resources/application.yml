# ============================================================
#  本地开发配置（application.yml）
# 上服务器时新建 application-prod.yml 覆盖对应项即可
# ============================================================

server:
  port: 8080
  # 监听所有网络接口，允许内网访问
  address: 0.0.0.0
  servlet:
    context-path: /

spring:
  application:
    name: comic

  # 加载项目根目录的 .env 文件
  config:
    import: optional:file:./.env[.properties]

  # 缓存配置（使用 Caffeine 内存缓存）
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m

  # ---------- 数据源：MySQL ----------
  datasource:
    url: jdbc:mysql://localhost:3306/comic?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  # ---------- 关闭自动建表（使用已有MySQL表） ----------
  sql:
    init:
      mode: never

  # ---------- 关闭 Security 自动生成密码的日志（可选） ----------
  security:
    user:
      name: ignored

  # ---------- 文件上传配置 ----------
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# ---------- MyBatis-Plus ----------
mybatis-plus:
  configuration:
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发期打印 SQL，上线可去掉
    map-underscore-to-camel-case: true
    jdbc-type-for-null: NULL
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ---------- 业务配置 ----------
comic:
  jwt:
    # 密钥至少 32 位；生产环境务必改成环境变量 ${JWT_SECRET}
    secret: comic-secret-key-please-change-in-production!!
    access-token-expiration: 7200000      # AccessToken 2 小时（毫秒）
    refresh-token-expiration: 604800000   # RefreshToken 7 天（毫秒）
    blacklist:
    max-size: 10000   # 黑名单最大缓存条数

  # ========== AI 配置（按功能分类）==========
  ai:
    # 文本生成配置（剧本、对话等）
    text:
      provider: deepseek           # 文本用 DeepSeek（思考模式）
      max-concurrent: 5           # 最大并发数
      timeout-seconds: 120        # 超时时间
      retry-times: 3              # 重试次数
      # DeepSeek API 配置
      deepseek:
        apiKey: ${DEEPSEEK_API_KEY:sk-your-deepseek-api-key}
        baseUrl: https://api.deepseek.com
        model: deepseek-chat
        maxTokens: 8192

    # 图片生成配置（角色立绘、分镜图等）
    image:
      provider: seedream          # 图片用 Seedream（火山引擎）
      max-concurrent: 2           # 并发数限制（图片生成资源占用大）
      timeout-seconds: 180        # 超时时间
      default-style: anime        # 默认风格
      default-width: 1024
      default-height: 1024

    # 视频生成配置（分镜视频等）
    video:
      provider: vidu              # 视频用 Vidu
      max-concurrent: 1           # 视频生成资源占用极大，限制为1
      timeout-seconds: 600        # 超时时间（10分钟）
      default-duration: 5         # 默认时长（秒）
      default-aspect-ratio: "16:9"

  # ========== 火山引擎 Ark SDK 配置（用于 Seedream） ==========
  ark:
    api-key: ${ARK_API_KEY:your-ark-api-key}
    base-url: https://ark.cn-beijing.volces.com/api/v3
    seedream-model: doubao-seedream-5-0-lite-260128
    seedance-model: doubao-seedance-1-5-pro-251215

  # ========== Vidu 视频生成配置 ==========
    vidu:
      api-key: ${VIDU_API_KEY:your-vidu-api-key}
      base-url: https://api.vidu.cn/ent/v2
      model: viduq3-turbo


  # ========== 阿里云 OSS 配置 ==========
  oss:
    ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    bucket-name: zhiqiantong-test
    endpoint: oss-cn-beijing.aliyuncs.com
    dir: comic/images/

  job:
    buffer-size: 3           # 预生成集数缓冲量
    worker-threads: 3        # 任务处理线程数
    file:
      upload-dir: ./uploads    # 文件上传目录
      base-url: http://localhost:8080/files  # 文件访问基础URL
      max-size: 100MB          # 最大文件大小

# 日志配置
logging:
  level:
    com.comic: DEBUG
    org.springframework.ai: INFO
  file:
    name: ./logs/comic.log


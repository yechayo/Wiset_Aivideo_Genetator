# ============================================================
#  本地开发配置（application.yml）
#  上服务器时新建 application-prod.yml 覆盖对应项即可
# ============================================================

server:
  port: 8080
  # 监听所有网络接口，允许内网访问
  address: 0.0.0.0
  servlet:
    context-path: /

spring:
  application:
    name: comic

    # 缓存配置（本地用Caffeine内存缓存）
    cache:
      type: caffeine
      caffeine:
        spec: maximumSize=500,expireAfterWrite=10m

  # ---------- 数据源：本地用 SQLite，上服务器换 PostgreSQL ----------
  datasource:
    url: jdbc:sqlite:./comic.db
    driver-class-name: org.sqlite.JDBC

  # ---------- 自动建表 ----------
  sql:
    init:
      mode: always          # 每次启动执行 schema.sql（已用 IF NOT EXISTS 保证幂等）

  # ---------- 关闭 Security 自动生成密码的日志 ----------
  security:
    user:
      name: ignored

  # Spring AI - Anthropic Claude 配置
  ai:
    anthropic:
      api-key: ${CLAUDE_API_KEY:请设置CLAUDE_API_KEY环境变量}
      chat:
        options:
          model: claude-opus-4-5
          max-tokens: 4096
          temperature: 0.7

# ---------- MyBatis-Plus ----------
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 开发期打印 SQL，上线可去掉
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ---------- 业务配置 ----------
comic:
  jwt:
    # 密钥至少 32 位；生产环境务必改成环境变量：${JWT_SECRET}
    secret: "comic-secret-key-please-change-in-production!!"
    access-token-expiration: 7200000      # AccessToken  2 小时（毫秒）
    refresh-token-expiration: 604800000   # RefreshToken 7 天（毫秒）
  blacklist:
    max-size: 10000   # 黑名单最大缓存条数
  ai:
    max-concurrent: 3        # 最大并发AI调用数
    timeout-seconds: 60      # 单次调用超时（秒）
    retry-times: 3           # 失败重试次数
  job:
    buffer-size: 3           # 预生成集数缓冲量
    worker-threads: 3        # 任务处理线程数

# 日志配置
logging:
  level:
    com.comic: DEBUG
    org.springframework.ai: INFO
  file:
    name: ./logs/comic.log

